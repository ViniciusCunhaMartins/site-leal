<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.css" type="text/css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="assets/css/template.css">
  <link rel="stylesheet" type="text/css" href="assets/css/style.css">
  <link rel="stylesheet" type="text/css" href="assets/css/modern.css">
  
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LEAL - Monitoramento</title>
  <link rel="icon" href="assets/img/leal2.png" type="image/x-icon">
</head>

<body>

    <div id="navbar-container"></div>
	  
    <section class="container mx-auto mt-5 col-xl-9 text-justify pb-5">
      <h6 class="text-lightdark mb-3">Monitoramento variáveis ambientais - Atualização a cada 1h</h6>
      <hr>
      <div class="row">
        
        <div class="col-sm-4">
          <div class="container-overlay mb-4">
            <img class="d-block w-100 card-img-top" src="assets/graphs/temperatura.png" alt="Temperatura do Ar">
            <button type="button" class="btn btn-primary overlay" data-bs-toggle="modal" data-bs-target="#modalExemplo">
              <div class="text">Temperatura do ar</div>
            </button>
          </div>

          <div class="modal fade" id="modalExemplo" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Temperatura do ar</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                  <img class="d-block w-100" src="assets/graphs/temperatura.png" alt="Temperatura do Ar">
                </div>
              </div>
            </div>
          </div>

          <div class="container-overlay mb-4">
            <img class="d-block w-100 card-img-top" src="assets/graphs/umidade.png" alt="Umidade Relativa do Ar">
            <button type="button" class="btn btn-primary overlay" data-bs-toggle="modal" data-bs-target="#umidade">
              <div class="text">Umidade Relativa do Ar</div>
            </button>
          </div>
	
          <div class="modal fade" id="umidade" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Umidade Relativa do Ar</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                  <img class="d-block w-100" src="assets/graphs/umidade.png" alt="Umidade Relativa do Ar">
                </div>
              </div>
            </div>
		  </div>
		</div>

		<div class="col-sm-4">
          <div class="container-overlay mb-4">
            <img class="d-block w-100 card-img-top" src="assets/graphs/velocidade.png" alt="Velocidade do Vento">
            <button type="button" class="btn btn-primary overlay" data-bs-toggle="modal" data-bs-target="#velocidade">
              <div class="text">Velocidade do Vento</div>
            </button>
          </div>

          <div class="modal fade" id="velocidade" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Velocidade do vento</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                  <img class="d-block w-100" src="assets/graphs/velocidade.png" alt="Velocidade do Vento">
                </div>
              </div>
            </div>
          </div>

          <div class="container-overlay mb-4">
            <img class="d-block w-100 card-img-top" src="assets/graphs/direcao.png" alt="Direção do Vento">
            <button type="button" class="btn btn-primary overlay" data-bs-toggle="modal" data-bs-target="#direcao">
              <div class="text">Direção do Vento</div>
            </button>
          </div>

          <div class="modal fade" id="direcao" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Direção do Vento</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                  <img class="d-block w-100" src="assets/graphs/direcao.png" alt="Direção do Vento">
                </div>
              </div>
            </div>
          </div>
		</div>

		<div class="col-sm-4">
          <div class="container-overlay mb-4">
            <img class="d-block w-100 card-img-top" src="assets/graphs/radiacao_difusa.png" alt="Radiação Difusa">
            <button type="button" class="btn btn-primary overlay" data-toggle="modal" data-target="#radiacao_difusa">
              <div class="text">Radiação Difusa</div>
            </button>
          </div>

          <div class="modal fade" id="radiacao_difusa" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Radiação Difusa</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                  <img class="d-block w-100" src="assets/graphs/radiacao_difusa.png" alt="Radiação Difusa">
                </div>
              </div>
            </div>
          </div>
	    </div>

	  </div>
    </section>

    <div id="footer-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Injeta Navbar
            fetch('html/navbar.html')
                .then(response => {
                    if (!response.ok) throw new Error('Erro ao carregar a navbar');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('navbar-container').innerHTML = data;

                    // 2. Cria dinamicamente o script do Bootstrap 5.3 para evitar conflitos nativos de componentes
                    const scriptBootstrap = document.createElement('script');
                    scriptBootstrap.src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js";
                    document.body.appendChild(scriptBootstrap);
                })
                .catch(error => console.error(error));

            // 3. Injeta Footer
            fetch('html/footer.html')
                .then(response => {
                    if (!response.ok) throw new Error('Erro ao carregar o footer');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('footer-container').innerHTML = data;
                })
                .catch(error => console.error(error));
        });
    </script>

  </body>
</html>
